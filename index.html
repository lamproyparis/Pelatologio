<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Πελατολόγιο</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <div class="container">
    <h1>Πελατολόγιο</h1>

    <input id="search" placeholder="🔍 Αναζήτηση πελάτη">

    <div class="add-box">
      <input id="name" placeholder="Όνομα πελάτη">
      <input id="phone" placeholder="Τηλέφωνο">
      <button onclick="addCustomer()">➕ Προσθήκη</button>
    </div>

    <h3>Πελάτες</h3>
    <div id="list"></div>

    <h3>Σύνολο οφειλών: <span id="total">0</span>€</h3>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
